{% extends 'app/base.html' %}
{% block title %}{{ title }} - 药品管理系统{% endblock %}
{% block content %}
<h2 class="mb-4">{{ title }}</h2>
<div class="alert alert-info">建议系统管理员每天发布 1 条医学常识科普；同一天重复发布会自动更新当天内容。</div>
<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="mb-3">
                <label class="form-label">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}<div class="text-danger small">{{ field.errors }}</div>{% endif %}
            </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary">保存</button>
            <a href="{% url 'medical_tip_list' %}" class="btn btn-outline-secondary">取消</a>
        </form>
    </div>
</div>
{% endblock %}
